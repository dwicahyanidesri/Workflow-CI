name: CI - Diabetes Prediction MLflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working directory: $(pwd)"
          ls -la

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas numpy matplotlib dagshub

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO_NAME }}.mlflow" >> $GITHUB_ENV

      - name: Run mlflow project
        run: |
          mlflow run MLProject \
            --env-manager local \
            --experiment-name "Diabetes Prediction - CI"

      - name: Get latest MLflow run_id
        run: |
          python - <<'PYEOF'
          import mlflow, os
          mlflow.set_tracking_uri(
            f"https://dagshub.com/{os.environ['DAGSHUB_USERNAME']}/{os.environ['DAGSHUB_REPO_NAME']}.mlflow"
          )
          client = mlflow.tracking.MlflowClient()
          exp = client.get_experiment_by_name("Diabetes Prediction - CI")
          if exp:
              runs = client.search_runs(exp.experiment_id, order_by=["start_time DESC"], max_results=1)
              if runs:
                  print(f"Latest Run ID: {runs[0].info.run_id}")
                  print(f"Status       : {runs[0].info.status}")
                  print(f"Metrics      : {runs[0].data.metrics}")
          PYEOF

      - name: Install Python dependencies
        run: pip install mlflow dagshub

      - name: Upload to GitHub
        run: |
          python - <<'PYEOF'
          import mlflow, os, json

          mlflow.set_tracking_uri(
            f"https://dagshub.com/{os.environ['DAGSHUB_USERNAME']}/{os.environ['DAGSHUB_REPO_NAME']}.mlflow"
          )
          client = mlflow.tracking.MlflowClient()
          exp = client.get_experiment_by_name("Diabetes Prediction - CI")
          if exp:
              runs = client.search_runs(exp.experiment_id, order_by=["start_time DESC"], max_results=1)
              if runs:
                  run_id = runs[0].info.run_id
                  local_dir = f"./artifacts_{run_id}"
                  client.download_artifacts(run_id, "", local_dir)
                  print(f"Artefak didownload ke: {local_dir}")
                  for f in os.listdir(local_dir):
                      print(f" - {f}")
          PYEOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts_* || true
          git diff --staged --quiet || git commit -m "CI: Upload MLflow artifacts [skip ci]"
          git push || true

      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            --model-uri "models:/DiabetesPredictionModel_CI/latest" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/diabetes-prediction-ci" \
            --env-manager local

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-prediction-ci:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-prediction-ci:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-prediction-ci:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-prediction-ci:${{ github.sha }}